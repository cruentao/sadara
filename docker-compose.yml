services:
  postgres:
    image: postgres:16-alpine
    container_name: sadara_db
    # Values read from .env in project root — falls back to local dev defaults
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sadara_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sadara_pass}
      POSTGRES_DB: ${POSTGRES_DB:-sadara_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - sadara-network

volumes:
  postgres_data:

networks:
  sadara-network:
    driver: bridge
